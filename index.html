<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Exercise</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
  <main class="gridContainer">
    <div class="cell cell--title">
      <h1>Care Bears - William Hernández</h1>
    </div>
 
    <div class="cell row1col3-4">
      <img src="images/Care_Bears.jpg" alt="Care Bears grupo">
    </div>
 
    <div class="cell row2col1">
      <img src="images/Cheerbearunlock.png" alt="Cheer Bear ilustración">
    </div>
 
    <div class="cell row2col2">
      <img src="images/Care_Bears_line_up.jpg" alt="Care Bears line-up Funko">
    </div>
 
    <div class="cell big-center">
      <img src="images/Care_Bears_logo.png" alt="Adventures in Care-a-lot">
    </div>
 
    <div class="cell row2col4">
      <img src="images/heart.jpg" alt="Tenderheart Bear">
    </div>
 
    <div class="cell wide-left">
      <img src="images/OriginalPlushies.png" alt="Original Plushies grupo">
    </div>
 
    <div class="cell row3col4">
      <img src="images/Cheer_Bear.JPG" alt="Cheer Bear JPG">
    </div>
 
    <div class="cell row4col1">
      <img src="images/Care_Bears_Character_Watch.jpg" alt="Care Bears reloj">
    </div>
 
    <div class="cell row4col2">
      <img src="images/Childhood_Museum.jpg" alt="Childhood Museum">
    </div>
 
    <div class="cell banner">
      <img src="images/Green_Care_Bear.jpg" alt="Green Care Bear">
    </div>
  </main>
</body>
</html>
