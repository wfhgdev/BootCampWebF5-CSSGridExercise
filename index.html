<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Grid Exercise</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    
  <aside class="sidebar">
    <span>Only with CSS Grid</span>
  </aside>
 
  <main class="grid-container">
 
    <div class="cell cell--title">
      <h1>Care Bears</h1>
    </div>
 
    <div class="cell cell--hero">
      <img src="images/Care_Bears.jpg" alt="Care Bears grupo" />
    </div>
 
    <div class="cell cell--sm1">
      <img src="images/Cheerbearunlock.png" alt="Cheer Bear Funko Pop" />
    </div>
 
    <div class="cell cell--sm2">
      <img src="images/Care_Bears_line_up.jpg" alt="Care Bears line up Funko" />
    </div>
 
    <div class="cell cell--big-center">
      <img src="images/Care_Bears_logo.png" alt="Care Bears Adventures in Care-a-lot" />
    </div>
 
    <div class="cell cell--sm3">
      <img src="images/heart.jpg" alt="Tenderheart Bear Funko" />
    </div>
 
    <div class="cell cell--wide-left">
      <img src="images/OriginalPlushies.png" alt="Care Bears grupo line-up" />
    </div>
 
    <div class="cell cell--sm4">
      <img src="images/Cheer_Bear.JPG" alt="Grumpy Bear Funko Pop" />
    </div>
 
    <div class="cell cell--sm5">
      <img src="images/Care_Bears_Character_Watch.jpg" alt="Bedtime Bear Funko Pop" />
    </div>
 
    <div class="cell cell--sm6">
      <img src="images/Childhood_Museum.jpg" alt="Cheer Bear y Love-a-Lot Funko" />
    </div>
 
    <div class="cell cell--banner">
      <img src="images/Green_Care_Bear.jpg" alt="Love All banner Care Bears" />
    </div>
 
</body>
</html>
